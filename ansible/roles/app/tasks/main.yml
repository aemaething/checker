---
- name: Install Docker via official script
  shell: curl -fsSL https://get.docker.com | sh
  args:
    creates: /usr/bin/docker

- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0750"

- name: Template .env
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    mode: "0600"

- name: Copy Caddyfile
  template:
    src: Caddyfile.j2
    dest: "{{ app_dir }}/Caddyfile"
    mode: "0644"

- name: Copy docker-compose.yml
  copy:
    src: "{{ playbook_dir }}/../docker-compose.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: "0644"

- name: Log in to GitHub Container Registry
  shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u aemaething --password-stdin
  no_log: true

- name: Start services
  shell: docker compose pull && docker compose up -d --remove-orphans
  args:
    chdir: "{{ app_dir }}"
