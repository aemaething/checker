---
app_image: ghcr.io/aemaething/checker:latest
app_dir: /opt/checkers

# Non-secret application config
app_name: Checkers
app_env: production
app_debug: "false"
app_url: "https://{{ domain }}"

db_connection: pgsql
db_host: postgres
db_port: "5432"
db_database: checkers
db_username: checkers

reverb_app_id: "1"
reverb_app_key: checkers-app
reverb_host: "{{ domain }}"
reverb_scheme: https
reverb_port: "443"
